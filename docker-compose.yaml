services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DISCORD_TOKEN: "YOUR_BOT_TOKEN_HERE"
      OPENAI_API_KEY: "YOUR_OPENAI_API_KEY_HERE"
      # JSON map of guild ID -> list of monitored channel IDs
      MONITORED_GUILDS: '{"123456789": [99881231231, 1233341213]}'
      BOOSTER_REQUIRED_ROLE_ID: "1334991587285012583"
    restart: unless-stopped
